workflows:
  build-android:
    name: Build Android APK (Expo)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 17
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - ./node_modules
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Expo prebuild (clean regenerate Android folder)
        script: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        script: chmod +x android/gradlew

      - name: Build debug APK
        script: cd android && ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - RPERKO28@gmail.com
