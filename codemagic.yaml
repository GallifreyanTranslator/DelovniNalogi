workflows:
  build-android:
    name: Build Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Full clean to remove old build artifacts
        script: |
          flutter clean
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf build
      - name: Upgrade Flutter & pub get
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter pub get
          flutter doctor -v
      - name: Build release APK (split per ABI)
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
