workflows:
  build-android:
    name: Build Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Aggressive clean (remove ALL old artifacts)
        script: |
          flutter clean || true
          rm -rf android/.gradle android/build build .dart_tool
          echo "Clean complete"
      - name: Force Flutter upgrade & pub get
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter pub get --verbose
          flutter doctor -v
      - name: Verify v2 embedding setup
        script: |
          echo "Checking AndroidManifest for flutterEmbedding v2..."
          grep "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "META-DATA MISSING!"
          echo "Checking MainActivity..."
          cat android/app/src/main/kotlin/com/example/delovni_nalogi/MainActivity.kt || echo "MainActivity.kt MISSING!"
      - name: Build release APK (split per ABI)
        script: flutter build apk --release --split-per-abi --verbose
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - RPERKO28@gmail.com   # change this
