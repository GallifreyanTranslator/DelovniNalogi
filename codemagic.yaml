workflows:
  build-android:
    name: Build Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Aggressive clean
        script: |
          flutter clean || true
          rm -rf android/.gradle android/build build .dart_tool
      - name: Upgrade & pub get
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter pub get --verbose
      - name: Debug v1 check
        script: |
          echo "Checking for v1 embedding in manifest..."
          grep -r "io.flutter.app.FlutterActivity" android/ || echo "No v1 FlutterActivity found"
          grep -r "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "v2 meta-data MISSING!"
      - name: Build APK
        script: flutter build apk --release --split-per-abi --verbose
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - RPERKO28@gmail.com   # change this
