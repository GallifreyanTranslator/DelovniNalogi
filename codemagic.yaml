workflows:
  build-android:
    name: Build Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2   # ← changed to free-tier safe option (mac_mini_m2 is paid)
    scripts:
      - name: Aggressive clean (remove old build artifacts)
        script: |
          flutter clean || true
          rm -rf android/.gradle android/build build .dart_tool .flutter-plugins*
          echo "Clean complete"
      - name: Upgrade Flutter, pub get & doctor check
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter pub get --verbose
          flutter doctor -v
      - name: Debug v1/v2 embedding check
        script: |
          echo "Checking for v1 embedding in manifest..."
          grep -r "io.flutter.app.FlutterActivity" android/ || echo "No v1 FlutterActivity found (good!)"
          echo "Checking for v2 meta-data..."
          grep "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "v2 meta-data MISSING! (critical error)"
      - name: Build release APK (split per ABI)
        script: flutter build apk --release --split-per-abi --verbose --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - RPERKO28@gmail.com   # change this
