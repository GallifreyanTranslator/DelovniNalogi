workflows:
  build-android:
    name: Build Android APK (Expo)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22          # <-- POPRAVLJENO: zdaj uporablja Node 22 (odpravi vse EBADENGINE napake)
      # flutter in xcode nista potrebna za Expo Android build, zato jih odstranim
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle
        - ./node_modules
    scripts:
      - name: Install dependencies
        script: npm ci      # <-- POPRAVLJENO: npm ci je hitrejši in zanesljivejši v CI-ju (namesto npm install)
      - name: Expo prebuild
        script: npx expo prebuild --platform android --clean
      - name: Build APK
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - RPERKO28@gmail.com
