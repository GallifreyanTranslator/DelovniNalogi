name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── Add packages that are used in code but missing from package.json ─
      - name: Patch missing dependencies
        run: |
          # expo-file-system and expo-sharing are used for Excel export but missing
          npm pkg set dependencies.expo-file-system="~20.0.0"
          npm pkg set dependencies.expo-sharing="~13.0.0"
          # react-native-gesture-handler is required by expo-router
          npm pkg set dependencies.react-native-gesture-handler="~2.24.0"

      # ─── Install ──────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo CLI
        run: |
          node_modules/.bin/expo --version
          echo "✅ expo CLI ready"

      # ─── Generate native Android project ─────────────────────────────────
      - name: Expo Prebuild (Android)
        run: node_modules/.bin/expo prebuild --platform android --clean --no-install

      # ─── Build APK ────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── Artifacts ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-report
          path: |
            android/build/reports/
            android/app/build/reports/
