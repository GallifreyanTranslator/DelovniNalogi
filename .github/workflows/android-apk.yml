name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Ensure expo CLI is available
        run: |
          if [ ! -f "./node_modules/.bin/expo" ]; then
            echo "expo binary not found in node_modules, installing explicitly..."
            npm install expo expo-router --legacy-peer-deps
          fi
          echo "expo version: $(./node_modules/.bin/expo --version)"

      - name: 🔨 Expo Prebuild (generate Android folder)
        run: ./node_modules/.bin/expo prebuild --platform android --clean

      - name: ⚙️ Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🚀 Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/*.apk
