name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ── Fix 4: opt all JavaScript actions into the Node.js 24 runner ──────────────
# GitHub is deprecating the Node 20 action runner. Setting this env var at the
# workflow level silences the warnings and uses Node 24 for all action steps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v4 — latest stable (Node 20 runner internally)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # actions/setup-node@v4 — latest stable
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # ← cache npm dependencies between runs

      # actions/setup-java@v4 — latest stable
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'        # ← cache Gradle files between runs

      # ─── Fix all dependency versions for Expo SDK 55 ─────────────────────
      - name: Fix package.json dependencies for SDK 55
        run: |
          # expo-web-browser ~1.1.0 does NOT exist; SDK 55 uses ~55.0.0
          npm pkg set dependencies.expo-web-browser="~55.0.0"

          # react-native-screens SDK 55 requires 4.23.0 (not ~4.0.0)
          npm pkg set dependencies.react-native-screens="~4.23.0"

          # expo-splash-screen SDK 55 version
          npm pkg set dependencies.expo-splash-screen="~55.0.0"

          # expo-status-bar SDK 55 version
          npm pkg set dependencies.expo-status-bar="~55.0.0"

          # expo-file-system + expo-sharing for xlsx export
          npm pkg set dependencies.expo-file-system="~55.0.0"
          npm pkg set dependencies.expo-sharing="~55.0.0"

          # react-native-gesture-handler 2.30.0+ required for RN 0.83
          npm pkg set dependencies.react-native-gesture-handler="~2.30.0"

          # AsyncStorage: old-arch compatible storage (MMKV removed)
          npm pkg set dependencies.@react-native-async-storage/async-storage="~2.1.2"

          # emoji2 + androidx.core for async EmojiCompat config plugin
          # (these are resolved by Gradle via the react-native transitive deps,
          #  but listing them avoids version conflicts if AGP resolves differently)
          npm pkg delete dependencies.react-native-mmkv 2>/dev/null || true

          echo "📦 Final dependencies:"
          node -e "const p=require('./package.json'); console.log(JSON.stringify(p.dependencies, null, 2))"

      # ─── Install ──────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo CLI
        run: |
          node_modules/.bin/expo --version
          echo "✅ expo CLI ready"

      # ─── Generate native Android project ─────────────────────────────────
      # Config plugins (plugins/withAndroidOptimizations.js) run during prebuild
      # and patch MainApplication.kt, AndroidManifest.xml, build.gradle.
      - name: Expo Prebuild (Android)
        run: node_modules/.bin/expo prebuild --platform android --clean --no-install

      # ─── Verify config-plugin patches were applied ────────────────────────
      - name: Verify native patches
        run: |
          echo "── AndroidManifest extractNativeLibs ──"
          grep -o 'extractNativeLibs[^"]*"[^"]*"' android/app/src/main/AndroidManifest.xml || echo "(not found — check plugin)"

          echo "── MainApplication EmojiCompat ──"
          grep -c 'Async EmojiCompat' android/app/src/main/java/com/delovni/nalogi/MainApplication.kt 2>/dev/null \
            && echo "✅ EmojiCompat patch applied" \
            || echo "⚠️  EmojiCompat patch not found (Kotlin file path may differ)"

          echo "── build.gradle Hermes / bundleInRelease ──"
          grep -E 'hermesEnabled|bundleInRelease' android/app/build.gradle || echo "(not found — check plugin)"

      # ─── Build APK ────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── Artifacts ────────────────────────────────────────────────────────
      # actions/upload-artifact@v4 — latest stable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-report
          path: |
            android/build/reports/
            android/app/build/reports/
