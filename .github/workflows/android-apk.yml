name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # FIX: Set to TRUE and use NODE24 as requested by GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fix package.json dependencies for SDK 55
        run: |
          npm pkg set dependencies.expo-web-browser="~55.0.0"
          npm pkg set dependencies.react-native-screens="~4.23.0"
          npm pkg set dependencies.expo-splash-screen="~55.0.0"
          npm pkg set dependencies.expo-status-bar="~55.0.0"
          npm pkg set dependencies.expo-file-system="~55.0.0"
          npm pkg set dependencies.expo-sharing="~55.0.0"
          npm pkg set dependencies.react-native-gesture-handler="~2.30.0"
          npm pkg set dependencies.@react-native-async-storage/async-storage="~2.1.2"
          npm pkg delete dependencies.react-native-mmkv 2>/dev/null || true

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      # 1. Generate the 'android' folder FIRST
      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      # 2. NOW Setup Java (it can now find 'android/build.gradle' for caching)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' 

      - name: Verify native patches
        run: |
          grep -o 'extractNativeLibs[^"]*"[^"]*"' android/app/src/main/AndroidManifest.xml || echo "Not found"
          grep -c 'EmojiCompat' android/app/src/main/java/com/delovni/nalogi/MainApplication.kt 2>/dev/null || echo "Not found"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
