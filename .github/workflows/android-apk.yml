name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── Fix all dependency versions for Expo SDK 55 ─────────────────────
      # SDK 55 aligns ALL expo/* packages to ~55.x.x versioning.
      # react-native-screens 4.23.0 is required by SDK 55 (not ~4.0.0).
      # react-native-safe-area-context 5.x is correct.
      - name: Fix package.json dependencies for SDK 55
        run: |
          # expo-web-browser ~1.1.0 does NOT exist; SDK 55 uses ~55.0.0
          npm pkg set dependencies.expo-web-browser="~55.0.0"

          # react-native-screens SDK 55 requires 4.23.0 (not ~4.0.0)
          npm pkg set dependencies.react-native-screens="~4.23.0"

          # expo-splash-screen SDK 55 version
          npm pkg set dependencies.expo-splash-screen="~55.0.0"

          # expo-status-bar SDK 55 version (already in package.json but ensure correct)
          npm pkg set dependencies.expo-status-bar="~55.0.0"

          # Add packages used in code but missing from package.json
          npm pkg set dependencies.expo-file-system="~55.0.0"
          npm pkg set dependencies.expo-sharing="~55.0.0"

          # react-native-gesture-handler 2.30.0+ is required for react-native 0.83 (SDK 55)
          # 2.24.x had a breaking C++ API incompatibility with RN 0.83's shadowNodeFromValue removal
          npm pkg set dependencies.react-native-gesture-handler="~2.30.0"

          echo "📦 Final dependencies:"
          node -e "const p=require('./package.json'); console.log(JSON.stringify(p.dependencies, null, 2))"

      # ─── Install ──────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo CLI
        run: |
          node_modules/.bin/expo --version
          echo "✅ expo CLI ready"

      # ─── Generate native Android project ─────────────────────────────────
      - name: Expo Prebuild (Android)
        run: node_modules/.bin/expo prebuild --platform android --clean --no-install

      # ─── Build APK ────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew
        
      - name: 🚀 Build Debug APKđ
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --no-configuration-cache
          
      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── Artifacts ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-report
          path: |
            android/build/reports/
            android/app/build/reports/
