name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # SDK 55 requires Node 20+

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Dependencies
        # We combine your separate installs to avoid version conflicts
        run: |
          npm install --legacy-peer-deps
          npm install @expo/vector-icons @react-native-async-storage/async-storage xlsx expo-status-bar --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        # Use 'npx expo' instead of pathing to node_modules (cleaner & safer)
        # --no-install tells it not to run npm install again inside the step
        run: npx expo prebuild --platform android --clean --no-install

      - name: ⚙️ Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🚀 Build Debug APK
        # No-daemon is key for CI to prevent the runner from hanging
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug-apk
          # Path check: In SDK 55, ensure this path matches your build output
          path: android/app/build/outputs/apk/debug/*.apk
