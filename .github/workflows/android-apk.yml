name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Install missing packages not yet in package.json
          npm install \
            @expo/vector-icons@~14.0.4 \
            @react-native-async-storage/async-storage@~2.2.0 \
            expo-file-system@~18.0.12 \
            expo-sharing@~13.0.1 \
            expo-status-bar@~2.2.0 \
            --legacy-peer-deps
          # Fix expo-web-browser to correct SDK 55 version
          npm install expo-web-browser@~14.0.0 --legacy-peer-deps

      - name: 🔍 Verify expo binary
        run: |
          ls node_modules/.bin/expo && echo "✅ expo found" || echo "❌ expo missing"
          node_modules/.bin/expo --version

      - name: 🔨 Expo Prebuild
        run: node_modules/.bin/expo prebuild --platform android --clean --no-install

      - name: ⚙️ Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🚀 Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: 📥 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
